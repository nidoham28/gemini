name: Multi-Platform Flutter Debug Build

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  # ==========================================
  # 1. Android Debug Build (Ubuntu)
  # ==========================================
  build-android:
    name: Build Android (Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test

      - name: Build Android Debug APK
        run: flutter build apk --debug

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-builds
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ==========================================
  # 2. iOS Debug Build (macOS)
  # ==========================================
  build-ios:
    name: Build iOS (Debug)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS Debug (No Code Sign)
        run: flutter build ios --debug --no-codesign

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-builds
          path: build/ios/iphoneos/
          retention-days: 7

  # ==========================================
  # 3. Web Debug Build (Ubuntu)
  # ==========================================
  build-web:
    name: Build Web (Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web (Debug Mode)
        run: flutter build web --debug

      - name: Upload Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-debug-build
          path: build/web/
          retention-days: 7

  # ==========================================
  # 4. Windows Desktop Debug Build
  # ==========================================
  build-windows:
    name: Build Windows Desktop (Debug)
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows Debug
        run: flutter build windows --debug

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug-build
          path: build/windows/x64/runner/Debug/
          retention-days: 7

  # ==========================================
  # 5. Linux Desktop Debug Build
  # ==========================================
  build-linux:
    name: Build Linux Desktop (Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Linux Desktop Support
        run: flutter config --enable-linux-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux Debug
        run: flutter build linux --debug

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-debug-build
          path: build/linux/x64/debug/
          retention-days: 7

  # ==========================================
  # 6. macOS Desktop Debug Build
  # ==========================================
  build-macos:
    name: Build macOS Desktop (Debug)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable macOS Desktop Support
        run: flutter config --enable-macos-desktop

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS Debug
        run: flutter build macos --debug

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-debug-build
          path: build/macos/Build/Products/Debug/
          retention-days: 7

  # ==========================================
  # 7. Summary Job (Depends on all builds)
  # ==========================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-web, build-windows, build-linux, build-macos]
    if: always()

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-builds/
          pattern: '*-debug-*'

      - name: List All Build Artifacts
        run: |
          echo "=== All Platform Builds ==="
          ls -la all-builds/
          echo ""
          echo "Build Status:"
          echo "Android : ${{ needs.build-android.result }}"
          echo "iOS     : ${{ needs.build-ios.result }}"
          echo "Web     : ${{ needs.build-web.result }}"
          echo "Windows : ${{ needs.build-windows.result }}"
          echo "Linux   : ${{ needs.build-linux.result }}"
          echo "macOS   : ${{ needs.build-macos.result }}"