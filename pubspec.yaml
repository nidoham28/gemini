name: gemini
description: "Google Gemini AI Chatbot - Text to Text with Streaming"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.3.0
  flutter_dotenv: ^5.2.1
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.6
  shimmer: ^3.0.0
  uuid: ^4.5.1
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env