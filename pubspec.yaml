name: gemini
description: "Google Gemini AI Chatbot - Text to Text with Streaming"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # iOS style icons
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Network & HTTP
  http: ^1.2.1

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # UI Components
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.1
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Environment file
  assets:
    - .env